<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nested Container Layout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .outer { width: 80%; margin: 0 auto; }
    .inner { width: 50%; padding: 10px; }
    img { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="outer" id="outer">
    <div class="inner" id="inner">
      <img id="img" data-testid="nested-img" alt="Nested">
    </div>
  </div>
  <script type="module">
    import { createSlimmage } from '/slimmage-core/index.js';
    createSlimmage(document.getElementById('img'), {
      src: '/image?width=160&quality=85&format=jpeg',
      container: '#inner',
      preferredFormat: 'jpeg',
      lazy: false,
    });
  </script>
</body>
</html>
