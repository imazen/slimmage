<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid Layout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      width: 100%;
    }
    .grid-item { min-width: 0; }
    img { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="grid" id="grid">
    <div class="grid-item" id="cell-0"><img id="img-0" data-testid="grid-img-0" alt="Grid 0"></div>
    <div class="grid-item" id="cell-1"><img id="img-1" data-testid="grid-img-1" alt="Grid 1"></div>
    <div class="grid-item" id="cell-2"><img id="img-2" data-testid="grid-img-2" alt="Grid 2"></div>
    <div class="grid-item" id="cell-3"><img id="img-3" data-testid="grid-img-3" alt="Grid 3"></div>
  </div>
  <script type="module">
    import { createSlimmage } from '/slimmage-core/index.js';
    for (let i = 0; i < 4; i++) {
      createSlimmage(document.getElementById(`img-${i}`), {
        src: `/image?width=160&quality=85&format=jpeg&id=${i}`,
        container: `#cell-${i}`,
        preferredFormat: 'jpeg',
        lazy: false,
      });
    }
  </script>
</body>
</html>
