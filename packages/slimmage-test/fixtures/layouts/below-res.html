<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Below-Resolution Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .container { width: 100%; }
    img { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="container" id="container">
    <img id="img" data-testid="img-below-res" alt="Below resolution test">
  </div>

  <script type="module">
    import { createSlimmage } from '/slimmage-core/index.js';

    // Store callback data globally for Playwright to read
    window.__slimmageCallbacks = {
      beforeLoadCalls: [],
    };

    const cleanup = createSlimmage(document.getElementById('img'), {
      src: '/image?width=160&quality=85&format=jpeg',
      container: '#container',
      preferredFormat: 'jpeg',
      lazy: false,
      maxWidth: 800,
      onBeforeLoad: (info) => {
        window.__slimmageCallbacks.beforeLoadCalls.push({
          containerWidth: info.containerWidth,
          requestedWidth: info.requestedWidth,
          quality: info.quality,
          url: info.url,
        });
        return info;
      },
    });

    window.__slimmageCleanup = cleanup;
  </script>
</body>
</html>
